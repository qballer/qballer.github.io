# Netlify build + headers for the Astro site.
# This file is the source of truth and overrides the dashboard build settings.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

# Blog was renamed to Notes; keep old URLs working.
[[redirects]]
  from = "/blog"
  to = "/notes"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/notes/:splat"
  status = 301

# Astro emits a 404.html; serve it on unmatched routes.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security headers (Content-Security-Policy tuned for this site:
# everything is self-hosted — no external fonts, scripts, or styles).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src https://www.youtube-nocookie.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' https://static.cloudflareinsights.com; connect-src 'self' https://cloudflareinsights.com; manifest-src 'self'"

# Long-cache hashed build assets.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
